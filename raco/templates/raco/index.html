{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>  

</head>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }
    /* img{img src= "./img/raco.png">
</title> */

    
    /* # O menu do topo do site */

    body{
      background:#ffffff;
    }

    /* HEADER */
    header{
      width:100%;
      height:90px;
      background:white;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 60px;
      border-bottom:1px solid #ddd;
    }

    .menu {
    display: flex;
    align-items: center;
    gap: 30px;
}

.logo {
    height: 50px; 
    width: auto;
}

    nav{
      display:flex;
      gap:40px;
    }

    nav a{
      text-decoration:none;
      color:#333;
      font-size:18px;
      transition:0.3s;
    }

    nav a:hover{
      color:#8e44ad;
    }

    nav img{ 
      height: 50px;
    }

    .button  {
    padding:12px 24px;
    background:#fff;
    border:none;      
    outline:none;    
    box-shadow:none;   
}


    /* HERO */
    .hero{
      width:100%;
      height:650px;
      background-image:url(fundo.png);
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.35);
    }

    .hero-content{
      position:relative;
      z-index:2;
      text-align:center;
      color:white;
      width:80%;
    }

    .hero-content h1{
      font-size:60px;
      font-weight:300;
      margin-bottom:40px;
    }

    /* SEARCH BOX */
    .search-box{
      width:100%;
      max-width:1000px;
      margin:auto;
      display:flex;
      background:white;
      border-radius:12px;
      overflow:hidden;
      border:3px solid rgba(255,255,255,0.6);
    }

    .search-box input{
      flex:1;
      padding:22px;
      border:none;
      outline:none;
      font-size:18px;
    }

    .search-box button{
      width:90px;
      color:black;
      font-size:24px;
      cursor:pointer;
    }

    /* INFO BAR */
    .info-bar{
      width:100%;
      background:#7d2fa5;
      color:white;
      display:flex;
      justify-content:center;
      gap:60px;
      padding:18px;
      font-size:15px;
    }

    /* CATEGORIES */
    .categories{
      padding:80px 10%;
    }

    .categories h2{
      font-size:42px;
      margin-bottom:40px;
      color:#333;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:#f5f5f5;
      border-radius:18px;
      overflow:hidden;
      transition:0.3s;
    }


    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card h3{
      padding:20px;
      text-align:center;
      color:#333;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    
    <!-- <img src="raco.png"> -->



    <nav>
     <nav class="menu"> 
    <img src="{% static 'img/raco.png' %}" alt="Logo" class="logo">
      <a href="#">Nossa loja</a>
      <a href="#">Kits festa</a>
      <a href="#">Convites</a>
      <a href="#">Lembrancinhas</a>
      <a href="#">Caixas e embalagens</a>
    </nav>

    <button class="btn">MINHA CONTA</button>

  </header>

  <!-- HERO -->
  <section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

      <h1>Onde cada detalhe conta a sua história</h1>

      <div class="search-box">
        <input type="text" placeholder="Qual produto deseja personalizar?">
        <button>buscar</button>
      </div>

    </div>

  </section>
  <!-- CATEGORIES -->
  <section class="categories">

    <h2>Nossas categorias</h2>

    <div class="cards">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=2070&auto=format&fit=crop">
        <h3>Kits Festa</h3>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?q=80&w=2070&auto=format&fit=crop">
        <h3>Convites</h3>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1469371670807-013ccf25f16a?q=80&w=2070&auto=format&fit=crop">
        <h3>Lembrancinhas</h3>
      </div>

    </div>

  </section>

</body>
</html>
    
</body>
</html>
