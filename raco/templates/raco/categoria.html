{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    /* CATEGORIES */
    .categories{
      padding:80px 10%;
    }

    .categories h2{
      font-size:42px;
      margin-bottom:40px;
      color:#333;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:#f5f5f5;
      border-radius:18px;
      overflow:hidden;
      transition:0.3s;
    }


    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card h3{
      padding:20px;
      text-align:center;
      color:#333;
    }
     </style>

</head>
<body> 
  <title> </title>
<head>
    <link rel="stylesheet" href="{% static 'raco/css/style.css' %}">
</head>

<!-- CATEGORIES -->
  <section class="categories">

    <h2>Nossas categorias</h2>

    <div class="cards">
      <h1><img src="{%static/img/raco.png%}"></h1>
      <div class="card">
        <img src="https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=2070&auto=format&fit=crop">
        <h3>Kits Festa</h3>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?q=80&w=2070&auto=format&fit=crop">
        <h3>Convites</h3>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1469371670807-013ccf25f16a?q=80&w=2070&auto=format&fit=crop">
        <h3>Lembrancinhas</h3>
      </div>

    </div>
